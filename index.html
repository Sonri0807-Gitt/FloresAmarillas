<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Amor 🌻</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="tree-canvas" id="tree-canvas">
            <div id="flowers-container"></div>
            <div class="trunk"></div>
        </div>

        <div class="message-card">
            <h1 class="title">
                Hoy 21 de Marzo No Pude Darte Tus Flores Amarillas <br>
                Pero Te Hice Esto Amor 💜
            </h1>
            <p class="dedication">
                "Si pudiera elegir un lugar seguro, sería a tu lado. <br>
                Cuanto más tiempo estoy contigo, más te amo."
            </p>
            <div class="timer-box">
                <p style="color: #ffca28; font-size: 0.8rem; margin-bottom: 5px;">Nuestro amor comenzó hace...</p>
                <div class="countdown">
                    <span id="days">0</span>d <span id="hours">0</span>h 
                    <span id="minutes">0</span>m <span id="seconds">0</span>s
                </div>
            </div>
            <p class="footer-love">— Eres mi vida entera —</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
