<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Miozotty 🌻</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div id="tree-canvas" class="tree-canvas">
            <div id="flowers-container"></div>
            <div class="trunk"></div>
        </div>

        <div class="message-card">
                        <h1 class="title">
                Hoy No Pude Darte Tus Flores Amarillas <br>
                Pero Te Hice Esto Con Mucho Amor 💜
                        </h1>
            <p class="dedication">"Si pudiera elegir un lugar seguro, sería a tu lado. <br> Cuanto más tiempo estoy contigo, más te amo."</p>
            
            <div class="timer-section">
                <p class="timer-label">Nuestro amor comenzó hace...</p>
                <div class="countdown">
                    <span id="dias">0</span>d <span id="horas">0</span>h <span id="minutos">0</span>m <span id="segundos">0</span>s
                </div>
            </div>
            <p class="footer-love">— 21 de Marzo —</p>
        </div>
    </div>

    <script>
        const fechaInicio = new Date("2021-08-10T00:00:00");
        function actualizar() {
            const diff = new Date() - fechaInicio;
            document.getElementById("dias").innerText = Math.floor(diff / 86400000);
            document.getElementById("horas").innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById("minutos").innerText = Math.floor((diff / 60000) % 60);
            document.getElementById("segundos").innerText = Math.floor((diff / 1000) % 60);
        }
        setInterval(actualizar, 1000); actualizar();

        const contenedor = document.getElementById("flowers-container");
        const canvas = document.getElementById("tree-canvas");

        function crearFlor(x, y, delay) {
            setTimeout(() => {
                const flor = document.createElement("div");
                flor.className = "flower";
                flor.innerHTML = "🌻";
                const centroX = canvas.offsetWidth / 2;
                const centroY = canvas.offsetHeight * 0.45;
                flor.style.left = (centroX + x) + "px";
                flor.style.top = (centroY + y) + "px";
                flor.style.fontSize = (12 + Math.random() * 10) + "px";
                contenedor.appendChild(flor);
            }, delay);
        }

        // CAPA 1: Silueta del corazón (1500 flores)
        for (let i = 0; i < 2500; i++) {
            const t = Math.random() * Math.PI * 2;
            const r = Math.pow(Math.random(), 0.5); 
            const x = 16 * Math.pow(Math.sin(t), 3) * 10.5 * r;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * 10.5 * r;
            crearFlor(x, y, i * 1);
        }

        // CAPA 2: RELLENO DEL HUECO CENTRAL (800 flores extra solo para el medio)
        for (let j = 0; j < 500; j++) {
            const t = Math.random() * Math.PI * 2;
            const r = Math.random() * 45; // Radio pequeño para tapar solo el centro
            const x = Math.cos(t) * r;
            const y = Math.sin(t) * r - 20; // Ajuste para que caiga justo en el hueco
            crearFlor(x, y, (j + 1500) * 1);
        }
        // Función para crear pétalos que caen
function createFallingPetals() {
    const container = document.body;
    setInterval(() => {
        const petal = document.createElement("div");
        petal.innerHTML = "🌼"; // Puedes usar 🌻 o ✨ también
        petal.style.position = "fixed";
        petal.style.top = "-20px";
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.fontSize = Math.random() * 10 + 10 + "px";
        petal.style.opacity = Math.random();
        petal.style.zIndex = "0"; // Para que caigan detrás del texto
        petal.style.transition = "transform 5s linear, top 5s linear";
        
        container.appendChild(petal);

        // Animación de caída
        setTimeout(() => {
            petal.style.transform = `rotate(${Math.random() * 360}deg) translateX(${Math.random() * 100 - 50}px)`;
            petal.style.top = "110vh";
        }, 10);

        // Limpieza para no saturar la memoria
        setTimeout(() => {
            petal.remove();
        }, 5000);
    }, 400); // Crea un pétalo cada 400ms
}

// Llama a la función dentro de window.onload
const originalOnload = window.onload;
window.onload = () => {
    if (originalOnload) originalOnload();
    createFallingPetals();
};

    </script>
</body>
</html>
